<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナスケル</title>
<link rel="icon" href="assets/nasukeru-icon.jpg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="hdr">
  <img class="app-icon" src="assets/nasukeru-icon.jpg" alt="ナスケル アイコン">
  <div class="logo">ナスケル</div>
  <div class="logo-tag">看護記録テンプレート</div>
  <a class="admin-back" href="/admin">管理画面へ</a>
</div>
<div class="main">
  <div class="left">
    <div class="card">
      <div class="ct">症状・疾患を検索</div>
      <div class="sw">
        <svg class="sic" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="si" id="si" type="text" placeholder="例：脳梗塞、脳卒中..." autocomplete="off"/>
        <div class="acd" id="acd"></div>
      </div>
      <div class="hint">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        登録済みテンプレートのみ表示します
      </div>
    </div>
    <div class="card">
      <div class="ct">専用テンプレート</div>
      <div class="qlist" id="qlist"></div>
    </div>
  </div>
  <div class="right">
    <div class="empty" id="empty">
      <div class="ei">📋</div>
      <div class="et">疾患を選択してテンプレートを表示</div>
      <div class="es">左の検索欄か専用テンプレートから選択してください</div>
    </div>
    <div id="ta"></div>
  </div>
</div>

<!-- Copy modal -->
<div class="ov" id="cov">
  <div class="cmod">
    <div class="cmhd">
      <h3>📋 コピー出力</h3>
      <button class="cmcl" onclick="closeCov()">×</button>
    </div>
    <div class="warn" id="warn"></div>
    <div class="prev" id="prev"></div>
    <div class="cact">
      <span class="chnt">テキストを選択するか、コピーボタンを押してください</span>
      <button class="btn bg" onclick="closeCov()">閉じる</button>
      <button class="btn bp" id="cpbtn" onclick="doCopy()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>コピー
      </button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/templates.js"></script>
<script src="js/field-meta.js"></script>
<script src="js/validation.js"></script>
<script src="js/copy-format.js"></script>
<script src="js/app.js"></script>
</body>
</html>
